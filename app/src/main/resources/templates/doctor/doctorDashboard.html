<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Doctor Dashboard</title>

  <link rel="stylesheet" th:href="@{/assets/css/adminDashboard.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/doctorDashboard.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/style.css}" />

  <script th:src="@{/js/util.js}" defer></script>
  <script th:src="@{/js/render.js}" defer></script>
  <script th:src="@{/js/components/header.js}" defer></script>
  <script th:src="@{/js/components/footer.js}" defer></script>
</head>

<body>
  <div class="container">
    <div class="wrapper">
      <div id="header"></div>

      <main class="main-content">
        <section class="doctor-toolbar">
          <h1>Doctor Dashboard</h1>
          <p>View appointments, patient details, and previous prescriptions.</p>

          <div class="doctor-controls">
            <input
              type="text"
              id="searchBar"
              class="searchBar"
              placeholder="Search by patient name"
            />

            <button id="todayBtn" class="button">Today's Appointments</button>

            <input
              type="date"
              id="dateFilter"
              class="input-field"
            />
          </div>
        </section>

        <section class="table-section">
          <table id="patientTable">
            <thead>
              <tr>
                <th>Patient ID</th>
                <th>Name</th>
                <th>Phone</th>
                <th>Email</th>
                <th>Appointment Time</th>
                <th>Status</th>
                <th>Prescription</th>
              </tr>
            </thead>
            <tbody id="patientTableBody">
              <tr>
                <td colspan="7" class="noPatientRecord">Loading appointments...</td>
              </tr>
            </tbody>
          </table>
        </section>
      </main>

      <div id="footer"></div>
    </div>
  </div>

  <div id="modal" class="modal">
    <div class="modal-content">
      <span id="closeModal" class="close">&times;</span>
      <div id="modal-body"></div>
    </div>
  </div>

  <script type="module" th:src="@{/js/doctorDashboard.js}" defer></script>
</body>
</html>
