<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard</title>

  <link rel="stylesheet" th:href="@{/assets/css/adminDashboard.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/style.css}" />

  <script th:src="@{/js/util.js}" defer></script>
  <script th:src="@{/js/render.js}" defer></script>
  <script th:src="@{/js/components/header.js}" defer></script>
  <script th:src="@{/js/components/footer.js}" defer></script>
</head>

<body>
  <div class="container">
    <div class="wrapper">
      <div id="header"></div>

      <main class="main-content">
        <section class="dashboard-toolbar">
          <h1>Admin Dashboard</h1>
          <p>Manage doctors, specialties, schedules, and availability.</p>

          <div class="toolbar-controls">
            <input
              type="text"
              id="searchBar"
              class="searchBar"
              placeholder="Search by doctor name"
            />

            <select id="filterSpecialty" class="filter-select">
              <option value="">All Specialties</option>
              <option value="Cardiologist">Cardiologist</option>
              <option value="Neurologist">Neurologist</option>
              <option value="Orthopedist">Orthopedist</option>
              <option value="Pediatrician">Pediatrician</option>
              <option value="Dermatologist">Dermatologist</option>
            </select>

            <select id="filterTime" class="filter-select">
              <option value="">All Times</option>
              <option value="09:00">Morning</option>
              <option value="14:00">Afternoon</option>
            </select>
          </div>
        </section>

        <section id="content" class="doctor-grid"></section>
      </main>

      <div id="footer"></div>
    </div>
  </div>

  <div id="modal" class="modal">
    <div class="modal-content">
      <span id="closeModal" class="close">&times;</span>
      <div id="modal-body"></div>
    </div>
  </div>

  <script type="module" th:src="@{/js/adminDashboard.js}" defer></script>
</body>
</html>
