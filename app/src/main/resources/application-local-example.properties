spring.application.name=back-end

spring.datasource.url=jdbc:mysql://127.0.0.1:3306/cms?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.data.mongodb.uri=mongodb://127.0.0.1:27017/prescriptions

management.endpoint.health.show-details=always
management.health.db.enabled=true

api.path=/
jwt.secret=LOCAL_SECRET_FOR_SMART_CLINIC_123456789

spring.web.resources.static-locations=classpath:/static/

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
