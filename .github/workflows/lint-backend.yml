name: Lint Backend Java

on:
  push:
  pull_request:

jobs:
  lint-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download Checkstyle
        run: |
          mkdir -p checkstyle
          curl -L -o checkstyle/checkstyle.jar https://github.com/checkstyle/checkstyle/releases/download/checkstyle-10.12.1/checkstyle-10.12.1-all.jar

      - name: Run Checkstyle
        run: |
          java -jar checkstyle/checkstyle.jar -c /google_checks.xml app/src/main/java/com/project/back_end || true
