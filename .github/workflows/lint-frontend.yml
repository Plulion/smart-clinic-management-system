name: Lint Frontend

on:
  push:
  pull_request:

jobs:
  lint-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend linters
        run: |
          npm install -g htmlhint stylelint eslint@8

      - name: Lint HTML files
        run: |
          htmlhint "app/src/main/resources/static/**/*.html" "app/src/main/resources/templates/**/*.html" || true

      - name: Lint CSS files
        run: |
          echo '{"extends":"stylelint-config-standard"}' > .stylelintrc.json
          npm install -g stylelint-config-standard
          stylelint "app/src/main/resources/static/assets/css/**/*.css" || true

      - name: Lint JavaScript files
        run: |
          eslint "app/src/main/resources/static/js/**/*.js" --env browser --parser-options ecmaVersion:2021 --no-eslintrc || true
